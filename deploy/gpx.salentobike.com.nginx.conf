# Salento GPX - gpx.salentobike.com
# Next.js app on port 3010
# HTTPS via Let's Encrypt (certbot certonly --nginx -d gpx.salentobike.com)

server {
    listen 80;
    server_name gpx.salentobike.com www.gpx.salentobike.com;

    # Redirect HTTP to HTTPS (after certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name gpx.salentobike.com www.gpx.salentobike.com;

    ssl_certificate /etc/letsencrypt/live/gpx.salentobike.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gpx.salentobike.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
